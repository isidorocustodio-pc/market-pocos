<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciar - Market Poços</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; text-align: center; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo { max-width: 140px; margin-bottom: 10px; }
        
        /* Botão de Foto Estilizado */
        .foto-area {
            background: #eef6ff;
            border: 2px dashed #007bff;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            display: block;
        }
        .camera-icon { font-size: 40px; margin-bottom: 10px; display: block; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        #imagem-preview { width: 100%; border-radius: 8px; display: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="Market Poços" class="logo">
    <h2 style="color: #007bff; margin-top: 0;">Aqui dá negócio</h2>

    <form id="form-anuncio">
        <img id="imagem-preview">
        
        <!-- REMOVIDO CAPTURE PARA LIBERAR GALERIA + CÂMERA -->
        <label for="foto" class="foto-area" id="label-foto">
            <span class="camera-icon">📷</span>
            <span style="color:#007bff; font-weight:bold;">Tirar Foto ou Escolher Galeria</span>
        </label>
        <input type="file" id="foto" accept="image/*" style="display:none">

        <input type="text" id="titulo" placeholder="O que está vendendo?" required>
        <input type="text" id="preco" placeholder="Preço (Ex: 150,00)" required>
        <input type="text" id="whatsapp" placeholder="WhatsApp (DDD + Número)">
        <input type="text" id="bairro" placeholder="Seu Bairro em Poços">

        <button type="submit" id="btn-enviar">Publicar Anúncio</button>
    </form>
</div>

<script>
    // PREENCHA COM SEUS DADOS REAIS
    const supabaseUrl = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabaseKey = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Prévia da foto e troca de botão
    document.getElementById('foto').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = document.getElementById('imagem-preview');
                img.src = event.target.result;
                img.style.display = 'block';
                document.getElementById('label-foto').innerText = "✅ Foto selecionada";
                document.getElementById('label-foto').style.padding = "10px";
            }
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('form-anuncio').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-enviar');
        btn.innerText = "Enviando...";
        btn.disabled = true;

        const file = document.getElementById('foto').files[0];
        let url = '';

        if (file) {
            const fileName = Date.now() + '-' + file.name;
            const { data, error } = await supabase.storage.from('fotos-anuncios').upload(fileName, file);
            if (!error) {
                const { data: publicData } = supabase.storage.from('fotos-anuncios').getPublicUrl(fileName);
                url = publicData.publicUrl;
            }
        }

        const { error: dbError } = await supabase.from('anuncios').insert([{
            titulo: document.getElementById('titulo').value,
            preco: document.getElementById('preco').value,
            whatsapp: document.getElementById('whatsapp').value,
            bairro: document.getElementById('bairro').value,
            imagem_url: url
        }]);

        if (dbError) {
            alert('Erro: ' + dbError.message);
            btn.disabled = false;
            btn.innerText = "Publicar Anúncio";
        } else {
            window.location.href = 'index.html';
        }
    };
</script>
</body>
</html>
