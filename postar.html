<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Poços - Postar</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        /* Botão Grande de Foto */
        .btn-foto { 
            display: block; 
            background: #eef6ff; 
            border: 3px dashed #007bff; 
            padding: 40px 10px; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-bottom: 20px;
        }
        .emoji-cam { font-size: 50px; display: block; }
        input[type="text"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        #preview { width: 100%; display: none; margin-bottom: 20px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:#007bff; margin-bottom:5px;">Market Poços</h2>
    <p style="margin-bottom:20px; color:#666;">Aqui dá negócio</p>

    <form id="meuForm">
        <img id="preview">
        
        <!-- Rótulo que serve como botão de clique -->
        <label for="fotoInput" class="btn-foto">
            <span class="emoji-cam">📸</span>
            <b style="color:#007bff;">TOQUE PARA TIRAR FOTO OU ESCOLHER GALERIA</b>
        </label>
        
        <!-- O INPUT SEM O COMANDO 'CAPTURE' -->
        <input type="file" id="fotoInput" accept="image/*" style="display:none">

        <input type="text" id="titulo" placeholder="Título do anúncio" required>
        <input type="text" id="preco" placeholder="Valor R$" required>
        <input type="text" id="whatsapp" placeholder="Seu Zap com DDD">
        <input type="text" id="bairro" placeholder="Seu Bairro">

        <button type="submit" id="btnEnviar">PUBLICAR AGORA</button>
    </form>
</div>

<script>
    // CREDENCIAIS DO SUPABASE
    const sUrl = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const sKey = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabase = supabase.createClient(sUrl, sKey);

    const fInput = document.getElementById('fotoInput');
    const fPreview = document.getElementById('preview');

    // MOSTRAR FOTO AO SELECIONAR
    fInput.onchange = () => {
        const file = fInput.files[0];
        if (file) {
            fPreview.src = URL.createObjectURL(file);
            fPreview.style.display = 'block';
            document.querySelector('.btn-foto').style.display = 'none';
        }
    };

    // ENVIAR DADOS
    document.getElementById('meuForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.innerText = "Enviando... aguarde";
        btn.disabled = true;

        const arquivo = fInput.files[0];
        let urlFinal = '';

        if (arquivo) {
            const nomeUnico = Date.now() + '-' + arquivo.name;
            const { data, error } = await supabase.storage.from('fotos-anuncios').upload(nomeUnico, arquivo);
            
            if (!error) {
                const { data: pData } = supabase.storage.from('fotos-anuncios').getPublicUrl(nomeUnico);
                urlFinal = pData.publicUrl;
            }
        }

        const { error: dbErr } = await supabase.from('anuncios').insert([{
            titulo: document.getElementById('titulo').value,
            preco: document.getElementById('preco').value,
            whatsapp: document.getElementById('whatsapp').value,
            bairro: document.getElementById('bairro').value,
            imagem_url: urlFinal
        }]);

        if (dbErr) {
            alert('Erro: ' + dbErr.message);
            btn.disabled = false;
            btn.innerText = "PUBLICAR AGORA";
        } else {
            alert('Aqui dá negócio! Anúncio publicado.');
            window.location.href = 'index.html';
        }
    };
</script>
</body>
</html>
