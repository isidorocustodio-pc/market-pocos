<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciar - Market Poços</title>
    <!-- Forçamos uma nova versão da biblioteca do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Reset total para evitar desconfiguração no mobile */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            padding: 20px 10px;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        .header-negocio {
            text-align: center;
            margin-bottom: 25px;
        }
        .header-negocio h2 { color: #007bff; font-size: 24px; }
        .header-negocio p { color: #666; font-size: 14px; }

        /* Botão de Foto Robusto */
        .area-upload {
            width: 100%;
            height: 150px;
            border: 2px dashed #007bff;
            background: #f0f7ff;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .camera-emoji { font-size: 50px; margin-bottom: 5px; }
        .texto-upload { color: #007bff; font-weight: bold; font-size: 14px; }

        /* Inputs e Botão */
        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            -webkit-appearance: none; /* Remove sombras do iOS */
        }
        button {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        #preview-img { width: 100%; height: 100%; object-fit: cover; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-negocio">
        <h2>Market Poços</h2>
        <p>Aqui dá negócio</p> <!-- -->
    </div>

    <form id="form-anuncio">
        <!-- O CAMPO DE FOTO AGORA ACEITA TUDO E NÃO FORÇA CÂMERA -->
        <label for="foto" class="area-upload" id="label-foto">
            <img id="preview-img">
            <div id="instrucoes">
                <span class="camera-emoji">📸</span>
                <span class="texto-upload">TIRAR OU ESCOLHER FOTO</span>
            </div>
        </label>
        <input type="file" id="foto" accept="image/*" style="display:none">

        <input type="text" id="titulo" placeholder="O que está vendendo?" required>
        <input type="text" id="preco" placeholder="Preço (Ex: R$ 300)" required>
        <input type="text" id="whatsapp" placeholder="WhatsApp (com DDD)">
        <input type="text" id="bairro" placeholder="Seu Bairro">

        <button type="submit" id="btn-submit">PUBLICAR AGORA</button>
    </form>
</div>

<script>
    const supabaseUrl = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabaseKey = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    // Lógica da Foto
    const inputFoto = document.getElementById('foto');
    const preview = document.getElementById('preview-img');
    const instrucoes = document.getElementById('instrucoes');

    inputFoto.onchange = () => {
        const file = inputFoto.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            instrucoes.style.display = 'none';
        }
    };

    document.getElementById('form-anuncio').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        btn.innerText = "CARREGANDO...";
        btn.disabled = true;

        const file = inputFoto.files[0];
        let fotoUrl = '';

        if (file) {
            const fileName = Date.now() + '-' + file.name;
            const { data, error } = await supabase.storage.from('fotos-anuncios').upload(fileName, file);
            if (!error) {
                const { data: pData } = supabase.storage.from('fotos-anuncios').getPublicUrl(fileName);
                fotoUrl = pData.publicUrl;
            }
        }

        const { error: dbError } = await supabase.from('anuncios').insert([{
            titulo: document.getElementById('titulo').value,
            preco: document.getElementById('preco').value,
            whatsapp: document.getElementById('whatsapp').value,
            bairro: document.getElementById('bairro').value,
            imagem_url: fotoUrl
        }]);

        if (dbError) {
            alert('Erro ao salvar. Verifique sua conexão.');
            btn.disabled = false;
            btn.innerText = "PUBLICAR AGORA";
        } else {
            // Redireciona com um código para forçar o index a atualizar também
            window.location.href = 'index.html?atualizado=' + Date.now();
        }
    };
</script>
</body>
</html>
