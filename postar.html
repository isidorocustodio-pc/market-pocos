<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste Market</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #222; color: white; }
        .btn-teste { 
            background: #007bff; padding: 30px; border-radius: 20px; 
            display: block; cursor: pointer; border: 5px solid white;
            font-size: 20px; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>TESTE DE ATUALIZAÇÃO</h1>
    <p>Se você estiver vendo este fundo PRETO, o site atualizou.</p>

    <label for="foto" class="btn-teste">
        📸 CLIQUE AQUI <br>
        (CÂMERA OU GALERIA)
    </label>
    <input type="file" id="foto" accept="image/*" style="display:none">

    <script>
        document.getElementById('foto').onchange = function() {
            alert('Funcionou! O navegador abriu as opções.');
        };
    </script>

</body>
</html>
