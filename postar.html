<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Anunciar - Market Poços</title>
    <!-- Adicionando um número de versão para forçar a atualização do navegador -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2?v=1.1"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 15px; background: #f8f9fa; color: #333; }
        .card { max-width: 400px; margin: 0 auto; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .logo-text { font-size: 24px; font-weight: bold; color: #007bff; margin-bottom: 5px; display: block; }
        .slogan { font-size: 14px; color: #6c757d; margin-bottom: 25px; display: block; }
        
        .upload-box {
            background: #f0f7ff;
            border: 2px dashed #007bff;
            border-radius: 15px;
            padding: 30px 10px;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .icon-cam { font-size: 45px; margin-bottom: 10px; }
        
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; background: #fff; }
        input:focus { border-color: #007bff; outline: none; }
        
        button { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        #img-preview { width: 100%; border-radius: 12px; display: none; margin-bottom: 20px; object-fit: cover; max-height: 250px; }
    </style>
</head>
<body>

<div class="card">
    <span class="logo-text">Market Poços</span>
    <span class="slogan">Aqui dá negócio</span>

    <form id="form-anuncio">
        <img id="img-preview">
        
        <label for="foto" class="upload-box" id="label-foto">
            <span class="icon-cam">📸</span>
            <span style="color:#007bff; font-weight:600;">Toque para selecionar foto</span>
            <small style="color:#6c757d; margin-top:5px;">Câmera ou Galeria</small>
        </label>
        <input type="file" id="foto" accept="image/*" style="display:none">

        <input type="text" id="titulo" placeholder="O que você está vendendo?" required>
        <input type="text" id="preco" placeholder="Preço (R$)" required>
        <input type="text" id="whatsapp" placeholder="Seu WhatsApp">
        <input type="text" id="bairro" placeholder="Seu Bairro em Poços">

        <button type="submit" id="btn-pub">Publicar Agora</button>
    </form>
</div>

<script>
    // IMPORTANTE: Use suas chaves reais abaixo
    const sUrl = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const sKey = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabase = supabase.createClient(sUrl, sKey);

    document.getElementById('foto').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const img = document.getElementById('img-preview');
            img.src = URL.createObjectURL(file);
            img.style.display = 'block';
            document.getElementById('label-foto').style.display = 'none';
        }
    };

    document.getElementById('form-anuncio').onsubmit = async (e) => {
        e.preventDefault();
        const b = document.getElementById('btn-pub');
        b.innerText = "Processando...";
        b.disabled = true;

        const f = document.getElementById('foto').files[0];
        let fUrl = '';

        if (f) {
            const fName = Date.now() + '-' + f.name;
            const { data, error } = await supabase.storage.from('fotos-anuncios').upload(fName, f);
            if (!error) {
                const { data: pData } = supabase.storage.from('fotos-anuncios').getPublicUrl(fName);
                fUrl = pData.publicUrl;
            }
        }

        const { error: dbErr } = await supabase.from('anuncios').insert([{
            titulo: document.getElementById('titulo').value,
            preco: document.getElementById('preco').value,
            whatsapp: document.getElementById('whatsapp').value,
            bairro: document.getElementById('bairro').value,
            imagem_url: fUrl
        }]);

        if (dbErr) {
            alert('Erro: ' + dbErr.message);
            b.disabled = false;
            b.innerText = "Publicar Agora";
        } else {
            window.location.href = 'index.html?v=' + Date.now();
        }
    };
</script>
</body>
</html>
