<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Poços - Aqui dá negócio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background-color: #f0f2f5; padding-bottom: 80px; }
        header { background: #fff; padding: 15px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #007bff; }
        #lista-anuncios {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            padding: 15px;
            max-width: 800px;
            margin: auto;
        }
        .anuncio-card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .anuncio-card img { width: 100%; height: 140px; object-fit: cover; }
        .info { padding: 10px; text-align: center; }
        .preco { color: #28a745; font-weight: bold; font-size: 18px; }
        .btn-postar {
            position: fixed; bottom: 20px; right: 20px;
            background: #007bff; color: white; padding: 15px 25px;
            border-radius: 30px; text-decoration: none; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<header>
    <h1>Market Poços</h1>
    <p><b>Aqui dá negócio</b></p>
</header>

<div id="lista-anuncios"></div>

<!-- LINK RELATIVO: Garante que abra o arquivo DO MESMO PROJETO -->
<a href="postar.html" class="btn-postar">+ Anunciar</a>

<script>
    const supabaseUrl = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabaseKey = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q';
    const supabase = supabase.createClient(supabaseUrl, supabaseKey);

    async function carregar() {
        const { data } = await supabase.from('anuncios').select('*').order('created_at', { ascending: false });
        const lista = document.getElementById('lista-anuncios');
        lista.innerHTML = data.map(anuncio => `
            <div class="anuncio-card">
                <img src="${anuncio.imagem_url || 'https://via.placeholder.com/150'}">
                <div class="info">
                    <h3 style="font-size:14px;">${anuncio.titulo}</h3>
                    <p class="preco">R$ ${anuncio.preco}</p>
                    <a href="https://wa.me/${anuncio.whatsapp}" style="display:block; background:#25d366; color:white; padding:5px; border-radius:5px; text-decoration:none; margin-top:5px; font-size:12px;">WhatsApp</a>
                </div>
            </div>
        `).join('');
    }
    carregar();
</script>
</body>
</html>
