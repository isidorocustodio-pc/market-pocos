<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Poços | Aqui dá negócio</title>
    <!-- Script do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    body { 
        font-family: 'Segoe UI', sans-serif; 
        padding: 10px; /* Reduzi o padding para ganhar espaço */
        text-align: center; 
        background: #f0f2f5; 
        color: #333;
        margin: 0;
    }
    header { margin: 15px 0; }
    .logo { 
        max-width: 150px; /* Logo um pouco menor no mobile */
        height: auto; 
    }
    form { 
        background: white; 
        padding: 20px; 
        border-radius: 15px; 
        width: 90%; /* Ocupa 90% da largura da tela */
        max-width: 400px; /* Mas não passa de 400px em telas grandes */
        margin: auto; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        box-sizing: border-box; /* Garante que o padding não "estoure" a largura */
    }
    input, select, .foto-input { 
        width: 100%; 
        margin: 8px 0; 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 8px; 
        box-sizing: border-box; /* Fundamental para o tamanho dar certo */
        font-size: 16px; 
    }
    .foto-input { 
        display: block;
        background: #eef6ff; 
        border: 2px dashed #007bff; 
        color: #007bff; 
        font-weight: bold; 
    }
    button { 
        background: #28a745; 
        color: white; 
        border: none; 
        padding: 15px; 
        border-radius: 8px; 
        cursor: pointer; 
        width: 100%; 
        font-size: 18px; 
        font-weight: bold; 
        margin-top: 10px; 
    }
    #preview img { 
        max-width: 100%; 
        height: auto;
        border-radius: 8px; 
        margin-top: 15px; 
        display: none; 
    }
</style>
</head>
<body>

<header>
    <!-- Sua logo oficial -->
    <img src="logo.png" alt="Market Poços - Aqui dá negócio" class="logo">
</header>

<div class="container">
    <a href="postar.html" class="btn-anunciar">🚀 Quero Anunciar Agora</a>
    
    <h2>Anúncios Recentes em Poços de Caldas</h2>
    <div id="lista-anuncios">
        <p>Carregando oportunidades...</p>
    </div>
</div>

<script>
    // Conexão automática com as variáveis da Vercel
    const supabaseUrl = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q'; // Substitua pelo link do painel do Supabase
    const supabaseKey = 'sb_publishable_sv9_kFW9Cvh7aY_toPIqew_LQulcI9q'; // Substitua pela chave anon do painel do Supabase
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function buscarAnuncios() {
        const { data, error } = await supabaseClient
            .from('anuncios') // Nome da tabela que criamos
            .select('*')
            .order('created_at', { ascending: false });

        const lista = document.getElementById('lista-anuncios');
        
        if (error) {
            lista.innerHTML = "<p>Erro ao carregar anúncios. Verifique a conexão.</p>";
            console.error(error);
            return;
        }

        if (data.length === 0) {
            lista.innerHTML = "<p>Nenhum anúncio encontrado. Seja o primeiro!</p>";
        } else {
            lista.innerHTML = data.map(item => `
                <div class="anuncio-card">
                    <img src="${item.imagem_url || 'https://via.placeholder.com/100'}" alt="Produto">
                    <div>
                        <h3 style="margin:0">${item.titulo}</h3>
                        <p style="color:#28a745; font-weight:bold; margin:5px 0">R$ ${item.preco}</p>
                        <small>Bairro: ${item.bairro || 'Poços de Caldas'}</small>
                    </div>
                </div>
            `).join('');
        }
    }

    buscarAnuncios();
</script>

</body>
</html>
